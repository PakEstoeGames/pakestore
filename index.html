<!-- index.html (Final Updated Version) -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pak E Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Pak E Store</h1>
<p class="sub">Premium Games Loading Store</p>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="phone" placeholder="Mobile Number">

<input type="email" id="email" placeholder="Email Address">

<textarea id="address" placeholder="Complete Address with House No / Area / City"></textarea>

<select id="hdd" onchange="updateAll()">
<option value="320">320 GB</option>
<option value="500">500 GB</option>
<option value="1000">1 TB</option>
<option value="2000">2 TB</option>
</select>

<select id="type" onchange="updateAll()">
<option value="portable">Portable HDD</option>
<option value="internal">Internal HDD</option>
</select>

<!-- Price / Size Box -->
<div id="priceBox"></div>

<h2>Select Games</h2>

<!-- Games Auto Load Here -->
<div id="gamesList"></div>

<!-- Warning Message -->
<div id="warning"></div>

<!-- Final Order Button -->
<button class="mainBtn" onclick="sendOrder()">
Place Order
</button>

</div>

<script src="script.js"></script>

</body>
</html>
